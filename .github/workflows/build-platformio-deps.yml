name: Build and Package PlatformIO Dependencies

# 手动触发工作流
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'latest'

permissions:
  contents: write   # 允许写入仓库内容（包括创建 Release）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO Core
        run: |
          pip install -U platformio
          pio --version

      - name: Extract ESP32 platform version from platformio.ini
        id: extract_version
        run: |
          # 从 platformio.ini 中提取 platform = espressif32@x.x.x 的版本号
          VERSION=$(grep -Po '(?<=platform\s*=\s*espressif32@)[^\s]+' platformio.ini || echo "")
          if [ -z "$VERSION" ]; then
            # 如果没有指定 @ 版本，则默认获取最新版（此时需要后面编译时确定）
            echo "No specific version found, will use latest during build."
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted platform version: $VERSION"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Build the example project (this downloads dependencies)
        run: |
          pio run  # 如果项目需要指定环境，可添加 -e <env>

      - name: Package all PlatformIO dependencies
        run: |
          mkdir -p output
          
          # 打包 platforms 下的每个子文件夹
          if [ -d ~/.platformio/platforms ]; then
            for dir in ~/.platformio/platforms/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                tar -czf "output/platforms_${dirname}.tar.gz" -C ~/.platformio/platforms "$dirname"
                echo "Packaged platforms/$dirname"
              fi
            done
          fi
          
          # 打包 packages 下的每个子文件夹
          if [ -d ~/.platformio/packages ]; then
            for dir in ~/.platformio/packages/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                tar -czf "output/packages_${dirname}.tar.gz" -C ~/.platformio/packages "$dirname"
                echo "Packaged packages/$dirname"
              fi
            done
          fi
          
          # 列出打包结果
          ls -lh output/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: PlatformIO Dependencies ${{ github.event.inputs.version_tag }}
          body: |
            This release contains all PlatformIO platforms and packages used by the project.
            Version extracted from platformio.ini: ${{ steps.extract_version.outputs.version }}
          files: output/*.tar.gz   # 上传所有生成的压缩包
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
